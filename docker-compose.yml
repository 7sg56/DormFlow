version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hostel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-hostel}
      MYSQL_DATABASE: ${DB_NAME:-hostel_mgmt}
    ports:
      - "3307:3306"
    volumes:
      - ./backend/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-hostel}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hostel_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hostel_backend
    restart: always
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-hostel}
      - DB_NAME=${DB_NAME:-hostel_mgmt}
      - PORT=${PORT:-5001}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hostel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostel_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - hostel_network

networks:
  hostel_network:
    driver: bridge
