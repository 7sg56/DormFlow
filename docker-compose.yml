version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: hostel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-hostel_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/db:/docker-entrypoint-initdb.d
    networks:
      - hostel_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hostel_backend
    restart: always
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - DB_NAME=${DB_NAME:-hostel_db}
      - PORT=${PORT:-5001}
    depends_on:
      - db
    networks:
      - hostel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostel_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - hostel_network

networks:
  hostel_network:
    driver: bridge

volumes:
  db_data:
